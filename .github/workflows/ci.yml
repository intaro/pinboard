name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    env:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
    steps:
      - uses: actions/checkout@v7

      # corepack resolves the exact pnpm version from package.json "packageManager";
      # it must be enabled before setup-node so the pnpm cache step can call pnpm.
      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      # --frozen-lockfile also fails on package.json / pnpm-lock.yaml drift,
      # which gives dependency-bump PRs a real frontend check.
      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

  docker-image:
    name: Docker image + stack smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Build the exact production image on every PR (never pushed). This is
      # the check that catches frontend-toolchain breakage and apk pin rot
      # before merge instead of at release-publish time. The gha cache is
      # shared with the release workflow, so a green PR makes the release
      # build nearly free.
      - name: Build production image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile.pinboard
          push: false
          load: true
          tags: xolegator/pinboard:ci-smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Boot the public compose stack with the built image
        run: |
          set -euo pipefail
          {
            echo "APP_SECRET=$(openssl rand -hex 32)"
            echo "MYSQL_ROOT_PASSWORD=Ci#Smoke-Root1"
            echo "DB_PASSWORD=Ci#Smoke-App1"
            echo "PINBOARD_TAG=ci-smoke"
          } > .env
          docker compose -f docker-compose.public.yml up -d --wait --wait-timeout 300

      - name: Smoke-check HTTP, user creation and aggregation
        run: |
          set -euo pipefail
          curl -fsS -o /dev/null http://127.0.0.1:8080/login
          docker exec pinboard-web php bin/console add-user smoke@example.com SmokeCi123 ROLE_ADMIN
          docker exec pinboard-aggregate php bin/console aggregate --no-interaction

      - name: Dump stack logs on failure
        if: failure()
        run: docker compose -f docker-compose.public.yml logs --tail 200

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.public.yml down -v

  cs-fixer:
    name: PHP CS Fixer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.4'
          extensions: intl, pdo_mysql
          coverage: none

      - uses: actions/cache@v6
        with:
          path: ~/.composer/cache
          key: composer-8.4-${{ hashFiles('composer.lock') }}
          restore-keys: composer-8.4-

      - run: composer install --no-interaction --prefer-dist --no-scripts

      - run: vendor/bin/php-cs-fixer fix --dry-run --diff

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.4'
          extensions: intl, pdo_mysql
          coverage: none

      - uses: actions/cache@v6
        with:
          path: ~/.composer/cache
          key: composer-8.4-${{ hashFiles('composer.lock') }}
          restore-keys: composer-8.4-

      - run: composer install --no-interaction --prefer-dist --no-scripts

      # phpstan-symfony reads the compiled DI container to resolve service types
      - name: Warm up Symfony dev container
        env:
          APP_ENV: dev
          APP_DEBUG: '1'
          DATABASE_URL: mysql://pinba:pinba@127.0.0.1:3306/pinba?serverVersion=8.4.0
        run: php bin/console cache:warmup

      - uses: actions/cache@v6
        with:
          path: var/phpstan
          key: phpstan-${{ hashFiles('phpstan.neon', 'composer.lock') }}
          restore-keys: phpstan-

      - run: vendor/bin/phpstan analyse --no-progress

  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, pdo_mysql
          coverage: none

      - uses: actions/cache@v6
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Run test suite
        env:
          APP_ENV: test
          DATABASE_URL: mysql://pinba:pinba@127.0.0.1:3306/pinba?serverVersion=8.4.0
        run: vendor/bin/phpunit --no-progress

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.4'
          extensions: intl, pdo_mysql
          coverage: pcov

      - uses: actions/cache@v6
        with:
          path: ~/.composer/cache
          key: composer-8.4-${{ hashFiles('composer.lock') }}
          restore-keys: composer-8.4-

      - run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Run test suite with coverage
        env:
          APP_ENV: test
          DATABASE_URL: mysql://pinba:pinba@127.0.0.1:3306/pinba?serverVersion=8.4.0
        run: vendor/bin/phpunit --no-progress --coverage-clover coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
