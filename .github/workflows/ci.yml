name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  cs-fixer:
    name: PHP CS Fixer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.4'
          extensions: intl, pdo_mysql
          coverage: none

      - uses: actions/cache@v6
        with:
          path: ~/.composer/cache
          key: composer-8.4-${{ hashFiles('composer.lock') }}
          restore-keys: composer-8.4-

      - run: composer install --no-interaction --prefer-dist --no-scripts

      - run: vendor/bin/php-cs-fixer fix --dry-run --diff

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.4'
          extensions: intl, pdo_mysql
          coverage: none

      - uses: actions/cache@v6
        with:
          path: ~/.composer/cache
          key: composer-8.4-${{ hashFiles('composer.lock') }}
          restore-keys: composer-8.4-

      - run: composer install --no-interaction --prefer-dist --no-scripts

      # phpstan-symfony reads the compiled DI container to resolve service types
      - name: Warm up Symfony dev container
        env:
          APP_ENV: dev
          APP_DEBUG: '1'
          DATABASE_URL: mysql://pinba:pinba@127.0.0.1:3306/pinba?serverVersion=8.4.0
        run: php bin/console cache:warmup

      - uses: actions/cache@v6
        with:
          path: var/phpstan
          key: phpstan-${{ hashFiles('phpstan.neon', 'composer.lock') }}
          restore-keys: phpstan-

      - run: vendor/bin/phpstan analyse --no-progress

  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, pdo_mysql
          coverage: none

      - uses: actions/cache@v6
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Run test suite
        env:
          APP_ENV: test
          DATABASE_URL: mysql://pinba:pinba@127.0.0.1:3306/pinba?serverVersion=8.4.0
        run: vendor/bin/phpunit --no-progress

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.4'
          extensions: intl, pdo_mysql
          coverage: pcov

      - uses: actions/cache@v6
        with:
          path: ~/.composer/cache
          key: composer-8.4-${{ hashFiles('composer.lock') }}
          restore-keys: composer-8.4-

      - run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Run test suite with coverage
        env:
          APP_ENV: test
          DATABASE_URL: mysql://pinba:pinba@127.0.0.1:3306/pinba?serverVersion=8.4.0
        run: vendor/bin/phpunit --no-progress --coverage-clover coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
