name: Docker

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release-tag:
        description: 'Release tag to publish, for example v2.1.2. Leave empty to use the current ref.'
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.release-tag != '' && inputs.release-tag || github.ref }}

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: |
          TAG="${{ inputs.release-tag != '' && inputs.release-tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Build locally first and prove the whole stack boots before anything is
      # pushed — a broken image must never reach Docker Hub. Mirrors the smoke
      # gate in pinba_engine's publish workflow.
      - name: Build image for smoke test
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile.pinboard
          push: false
          load: true
          tags: xolegator/pinboard:release-smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Note: PINBOARD_TAG support exists in docker-compose.public.yml since
      # v2.1.8 — re-publishing an older tag via workflow_dispatch will smoke
      # test whatever image the compose file at that ref references instead.
      - name: Smoke test — stack must boot before push
        run: |
          set -euo pipefail
          {
            echo "APP_SECRET=$(openssl rand -hex 32)"
            echo "MYSQL_ROOT_PASSWORD=Rel#Smoke-Root1"
            echo "DB_PASSWORD=Rel#Smoke-App1"
            echo "PINBOARD_TAG=release-smoke"
          } > .env
          docker compose -f docker-compose.public.yml up -d --wait --wait-timeout 300
          curl -fsS -o /dev/null http://127.0.0.1:8080/login
          docker exec pinboard-aggregate php bin/console aggregate --no-interaction
          docker compose -f docker-compose.public.yml down -v

      - name: Dump stack logs on failure
        if: failure()
        run: docker compose -f docker-compose.public.yml logs --tail 200 || true

      - name: Push to Docker Hub
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile.pinboard
          push: true
          tags: |
            xolegator/pinboard:${{ steps.meta.outputs.version }}
            xolegator/pinboard:latest
          cache-from: type=gha
