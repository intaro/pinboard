name: Docker

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release-tag:
        description: 'Release tag to publish, for example v2.1.2. Leave empty to use the current ref.'
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.release-tag != '' && inputs.release-tag || github.ref }}

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: |
          TAG="${{ inputs.release-tag != '' && inputs.release-tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile.pinboard
          push: true
          tags: |
            xolegator/pinboard:${{ steps.meta.outputs.version }}
            xolegator/pinboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
