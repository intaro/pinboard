name: Docker

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release-tag:
        description: 'Release tag to publish, for example v2.1.2. Leave empty to use the current ref.'
        required: false
        type: string

jobs:
  build-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release-tag != '' && inputs.release-tag || github.ref }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: |
          TAG="${{ inputs.release-tag != '' && inputs.release-tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.pinboard
          push: true
          tags: |
            xolegator/pinboard:${{ steps.meta.outputs.version }}
            xolegator/pinboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
